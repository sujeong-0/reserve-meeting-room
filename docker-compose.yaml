version: "3.8"

services:
  mariadb:
    image: mariadb:11.3
    container_name: mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: qawsedrf123!
      MYSQL_DATABASE: wiseai
      MYSQL_USER: wiseai
      MYSQL_PASSWORD: qawsedrf123!
    volumes:
      - ./data:/Users/ggong/Develop/db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci